<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>...Aspetta...</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1008;
      --paper: #f5edd6;
      --aged: #c9a96e;
      --shadow: #7a5c30;
    }

    body {
      background: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier Prime', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Texture grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    /* ───── VIGNETTA ───── */
    #waiting-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .comic-frame {
      border: 4px solid var(--ink);
      box-shadow: 8px 8px 0 var(--shadow);
      background: white;
      position: relative;
      width: min(520px, 92vw);
    }

    /* Panel interno della vignetta */
    .panel {
      padding: 28px 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid var(--ink);
    }

    /* SVG illustrazione */
    .illustration {
      width: 100%;
      max-width: 320px;
    }

    /* Fumetto di testo */
    .speech-bubble {
      position: relative;
      background: white;
      border: 3px solid var(--ink);
      border-radius: 18px;
      padding: 14px 20px;
      width: 100%;
      text-align: center;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      border: 9px solid transparent;
      border-top-color: var(--ink);
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: white;
      z-index: 1;
    }
    .speech-bubble p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: var(--ink);
      line-height: 1.4;
    }
    .speech-bubble strong {
      font-style: normal;
      font-weight: 700;
      display: block;
      margin-top: 4px;
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    }

    /* Caption bar in fondo alla vignetta */
    .caption-bar {
      background: var(--paper);
      padding: 12px 20px;
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--shadow);
      border-top: 2px solid var(--ink);
    }

    /* Countdown */
    .countdown-wrap {
      margin-top: 24px;
      text-align: center;
    }
    .countdown-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--shadow);
      margin-bottom: 6px;
    }
    #countdown {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3rem);
      color: var(--ink);
      letter-spacing: 0.05em;
    }

    /* ───── FOTO ───── */
    #photo-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 1.4s ease forwards;
    }

    .photo-frame {
      border: 6px solid var(--ink);
      box-shadow: 10px 10px 0 var(--shadow);
      background: white;
      padding: 12px 12px 48px;
      position: relative;
      width: min(500px, 92vw);
    }

    .photo-frame img {
      width: 100%;
      display: block;
    }

    .photo-caption {
      position: absolute;
      bottom: 10px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      color: var(--shadow);
      letter-spacing: 0.06em;
    }

    .auguri-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      color: var(--shadow);
      text-align: center;
      letter-spacing: 0.05em;
      margin-top: -8px;
    }

    .firme {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 5vw, 2rem);
      color: var(--ink);
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    .reveal-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      color: var(--ink);
      text-align: center;
      letter-spacing: 0.03em;
    }
    .reveal-text em {
      color: var(--shadow);
      font-style: italic;
    }

    /* ───── AFTER ───── */
    #after-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn 1s ease forwards;
      text-align: center;
    }
    #after-screen p {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      color: var(--shadow);
      font-style: italic;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Clock tick animation */
    .tick { animation: tick 1s steps(1) infinite; }
    @keyframes tick {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>

  <!-- SCHERMATA POST (dopo il 17 marzo 2026) -->
  <div id="after-screen">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="38" fill="none" stroke="#c9a96e" stroke-width="3"/>
      <path d="M20 42 Q40 58 60 42" stroke="#1a1008" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="28" cy="32" r="4" fill="#1a1008"/>
      <circle cx="52" cy="32" r="4" fill="#1a1008"/>
    </svg>
    <p>Il momento è già passato...<br/>ma il ricordo resta 🌸</p>
  </div>

  <script>
    function getState() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth(); // 0-based: marzo = 2
      const d = now.getDate();
      const h = now.getHours();
      const min = now.getMinutes();
      const sec = now.getSeconds();

      const isMarch16 = (y === 2026 && m === 2 && d === 15); // TEST
      const isMarch17 = (y === 2026 && m === 2 && d === 17);
      const isBefore16 = (y < 2026) ||
                         (y === 2026 && m < 2) ||
                         (y === 2026 && m === 2 && d < 15); // TEST
      const isAfter17  = (y > 2026) ||
                         (y === 2026 && m > 2) ||
                         (y === 2026 && m === 2 && d > 17);

      if (isMarch16 || isMarch17) return 'photo';
      if (isAfter17) return 'after';

      // Siamo prima del 16 marzo 2026
      // Mostra vignetta: se è il 15 marzo e sono le 00:00–23:59 → vignetta
      // (in generale: tutto il tempo prima del 16/3/2026 00:00)
      return 'waiting';
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateCountdown() {
      const now = new Date();
      const target = new Date(2026, 2, 16, 0, 0, 0); // 16 marzo 2026 00:00:00
      const diff = target - now;
      if (diff <= 0) { render(); return; }
      const totalSec = Math.floor(diff / 1000);
      const hh = Math.floor(totalSec / 3600);
      const mm = Math.floor((totalSec % 3600) / 60);
      const ss = totalSec % 60;
      const el = document.getElementById('countdown');
      const colon = '<span class="tick">:</span>';
      if (hh >= 24) {
        const days = Math.floor(hh / 24);
        const remH = hh % 24;
        el.innerHTML = `${days}g ${pad(remH)}${colon}${pad(mm)}${colon}${pad(ss)}`;
      } else {
        el.innerHTML = `${pad(hh)}${colon}${pad(mm)}${colon}${pad(ss)}`;
      }
    }

    function render() {
      const state = getState();
      document.getElementById('waiting-screen').style.display = 'none';
      document.getElementById('photo-screen').style.display   = 'none';
      document.getElementById('after-screen').style.display   = 'none';

      if (state === 'waiting') {
        document.getElementById('waiting-screen').style.display = 'flex';
        updateCountdown();
        setInterval(updateCountdown, 1000);
      } else if (state === 'photo') {
        document.getElementById('photo-screen').style.display = 'flex';
      } else {
        document.getElementById('after-screen').style.display = 'flex';
      }
    }

    render();
  </script>
